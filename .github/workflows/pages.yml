name: Deploy Mobile Demo To GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/mobile-demo/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/mobile-demo/package-lock.json
      - run: npm ci
      - run: npm run export:web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/mobile-demo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
